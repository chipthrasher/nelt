name: CI
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.8.3

    - name: Lint
      run: deno lint

  tag:
    # Only tag master pushes, and only if linting passed.
    needs: lint
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Expose the new tag so the sync job can publish it to S3.
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # Full history so the tag action can find the previous tag.
        fetch-depth: 0

    # Bumps major/minor/patch from the commit message (Conventional Commits:
    # feat: -> minor, fix: -> patch, BREAKING CHANGE / ! -> major), defaulting
    # to a patch bump otherwise, then pushes the new vX.Y.Z tag.
    - name: Push version tag
      id: tag
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch

  sync:
    # Only deploy master, and only if linting passed.
    needs: tag
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    # Pull the existing config down. Add tag to config.json from the CI tag.
    - name: Write version into config
      env:
        APP_VERSION: ${{ needs.tag.outputs.new_tag }}
      run: |
        aws s3 cp s3://nelt.chipthrasher.com/config.json config.json || echo '{}' > config.json
        jq --arg v "$APP_VERSION" '.version = $v' config.json > config.tmp && mv config.tmp config.json

    - name: Sync to S3
      run: aws s3 sync . s3://nelt.chipthrasher.com
